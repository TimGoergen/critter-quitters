<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <!-- Very short legs barely visible past the elytra edge -->
  <!-- Group A (L-front, R-mid, L-back) angled up; Group B (R-front, L-mid, R-back) angled down -->
  <path d="M 37 52 Q 28 44 22 38" stroke="#2A3A60" stroke-width="3.0" stroke-linecap="round" fill="none"/>
  <path d="M 36 74 Q 24 72 16 70" stroke="#2A3A60" stroke-width="3.0" stroke-linecap="round" fill="none"/>
  <path d="M 37 96 Q 28 90 20 84" stroke="#2A3A60" stroke-width="3.0" stroke-linecap="round" fill="none"/>
  <path d="M 91 52 Q 100 58 108 64" stroke="#2A3A60" stroke-width="3.0" stroke-linecap="round" fill="none"/>
  <path d="M 92 74 Q 102 76 112 78" stroke="#2A3A60" stroke-width="3.0" stroke-linecap="round" fill="none"/>
  <path d="M 91 96 Q 100 102 108 108" stroke="#2A3A60" stroke-width="3.0" stroke-linecap="round" fill="none"/>

  <!-- Head: tiny, peeking out from under pronotum -->
  <circle cx="64" cy="18" r="8" fill="#0F1A40"/>
  <circle cx="60" cy="16" r="2" fill="#CC1100"/>
  <circle cx="68" cy="16" r="2" fill="#CC1100"/>

  <!-- Pronotum: wide plate between head and elytra -->
  <ellipse cx="64" cy="34" rx="20" ry="10" fill="#0F2255"/>
  <ellipse cx="58" cy="28" rx="7" ry="3.5" fill="white" opacity="0.20"/>

  <!-- Elytra: the large shield-shaped wing cases — dominates the whole image -->
  <ellipse cx="64" cy="82" rx="28" ry="44" fill="#1A3880"/>

  <!-- Elytra edge highlight: lighter strip along right side for curved-surface depth -->
  <ellipse cx="80" cy="82" rx="10" ry="40" fill="#2A5AA0" opacity="0.50"/>

  <!-- Main specular highlight: upper-left of elytra — the primary 3D depth cue -->
  <ellipse cx="48" cy="58" rx="12" ry="8" fill="white" opacity="0.28"/>

  <!-- Elytra split line running head-to-tail down the centre -->
  <line x1="64" y1="42" x2="64" y2="122" stroke="#0F2255" stroke-width="2.0"/>

  <!-- Scutellum: small dark triangle at the top of the elytra split -->
  <polygon points="58,42 70,42 64,52" fill="#0F2255"/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <!-- Group A (L-front, R-mid, L-hindtib) forward; Group B (R-front, L-mid, R-hindtib) back -->
  <path d="M 52 37 Q 38 26 24 16" stroke="#2A1C0A" stroke-width="5.0" stroke-linecap="round" fill="none"/>
  <path d="M 47 50 Q 32 48 18 46" stroke="#2A1C0A" stroke-width="5.0" stroke-linecap="round" fill="none"/>
  <path d="M 76 37 Q 90 46 102 56" stroke="#2A1C0A" stroke-width="5.0" stroke-linecap="round" fill="none"/>
  <path d="M 81 50 Q 96 54 108 58" stroke="#2A1C0A" stroke-width="5.0" stroke-linecap="round" fill="none"/>
  <!-- Hind tibiae: very heavy — the cricket's defining rear legs -->
  <path d="M 26 76 Q 16 62 12 50" stroke="#2A1C0A" stroke-width="8.0" stroke-linecap="round" fill="none"/>
  <path d="M 102 76 Q 112 90 116 102" stroke="#2A1C0A" stroke-width="8.0" stroke-linecap="round" fill="none"/>

  <!-- Antennae -->
  <path d="M 58 18 Q 40 8 16 2" stroke="#2A1C0A" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <path d="M 70 18 Q 88 8 112 2" stroke="#2A1C0A" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <circle cx="16" cy="2" r="4.5" fill="#886644"/>
  <circle cx="112" cy="2" r="4.5" fill="#886644"/>

  <!-- Abdomen: single unified oval, same color as pronotum so they blend -->
  <ellipse cx="64" cy="82" rx="18" ry="30" fill="#4A3010"/>

  <!-- Wings: flat panels laid over the abdomen, tips angled toward the rear -->
  <path d="M 44 56 L 64 54 L 62 110 L 42 112 Z" fill="#5A4028" opacity="0.90"/>
  <path d="M 84 56 L 64 54 L 66 110 L 86 112 Z" fill="#5A4028" opacity="0.90"/>
  <!-- Wing center seam and one vein per side -->
  <line x1="64" y1="54" x2="64" y2="110" stroke="#3A2810" stroke-width="1.0" opacity="0.55"/>
  <line x1="52" y1="58" x2="55" y2="108" stroke="#3A2810" stroke-width="0.8" opacity="0.35"/>
  <line x1="76" y1="58" x2="73" y2="108" stroke="#3A2810" stroke-width="0.8" opacity="0.35"/>

  <!-- Hind femora: large bulging thighs, drawn above wings so they're clearly visible -->
  <ellipse cx="40" cy="76" rx="18" ry="13" fill="#3A2408"/>
  <ellipse cx="88" cy="76" rx="18" ry="13" fill="#3A2408"/>
  <ellipse cx="36" cy="72" rx="5" ry="3" fill="white" opacity="0.15"/>
  <ellipse cx="84" cy="72" rx="5" ry="3" fill="white" opacity="0.15"/>

  <!-- Pronotum: covers the wing roots and blends into the abdomen (same fill) -->
  <ellipse cx="64" cy="44" rx="20" ry="13" fill="#4A3010"/>
  <ellipse cx="64" cy="38" rx="13" ry="3.5" fill="#5C3C18" opacity="0.45"/>
  <ellipse cx="59" cy="38" rx="5" ry="3" fill="white" opacity="0.15"/>

  <!-- Head -->
  <circle cx="64" cy="25" r="10" fill="#3A2408"/>
  <ellipse cx="59" cy="20" rx="4" ry="2.5" fill="white" opacity="0.15"/>

  <!-- Eyes -->
  <circle cx="58" cy="23" r="3.5" fill="#CC8800"/>
  <circle cx="70" cy="23" r="3.5" fill="#CC8800"/>
  <circle cx="57" cy="22" r="1.4" fill="white" opacity="0.80"/>
  <circle cx="69" cy="22" r="1.4" fill="white" opacity="0.80"/>
</svg>

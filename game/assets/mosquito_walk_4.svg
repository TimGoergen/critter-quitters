<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <!-- Wings: flutter-down — outer tip drops, wing strokes downward -->
  <path d="M 56 57 L 14 70 L 56 73 Z" fill="#9B7040" opacity="0.65"/>
  <line x1="56" y1="57" x2="14" y2="70" stroke="#7A5828" stroke-width="0.8" opacity="0.65"/>
  <line x1="56" y1="65" x2="14" y2="69" stroke="#7A5828" stroke-width="0.6" opacity="0.55"/>
  <path d="M 72 57 L 114 70 L 72 73 Z" fill="#9B7040" opacity="0.65"/>
  <line x1="72" y1="57" x2="114" y2="70" stroke="#7A5828" stroke-width="0.8" opacity="0.65"/>
  <line x1="72" y1="65" x2="114" y2="69" stroke="#7A5828" stroke-width="0.6" opacity="0.55"/>

  <!-- Antennae: short -->
  <path d="M 59 37 Q 55 31 48 26" stroke="#2A1A08" stroke-width="1.8" stroke-linecap="round" fill="none"/>
  <path d="M 69 37 Q 73 31 80 26" stroke="#2A1A08" stroke-width="1.8" stroke-linecap="round" fill="none"/>
  <circle cx="48" cy="26" r="2" fill="#3A2408"/>
  <circle cx="80" cy="26" r="2" fill="#3A2408"/>

  <!-- Abdomen -->
  <path d="M 55 58 Q 50 72 52 85 Q 57 96 64 100 Q 71 96 76 85 Q 78 72 73 58 Z" fill="#5C3A1E"/>
  <ellipse cx="64" cy="67" rx="9" ry="2" fill="#9B7040" opacity="0.65"/>
  <ellipse cx="64" cy="76" rx="8" ry="2" fill="#9B7040" opacity="0.65"/>
  <ellipse cx="64" cy="84" rx="6" ry="1.5" fill="#9B7040" opacity="0.65"/>
  <ellipse cx="64" cy="91" rx="4" ry="1.5" fill="#9B7040" opacity="0.55"/>
  <ellipse cx="61" cy="62" rx="4" ry="2" fill="white" opacity="0.14"/>

  <!-- Thorax hump -->
  <ellipse cx="64" cy="57" rx="10" ry="6" fill="#4A2E10"/>
  <ellipse cx="62" cy="54" rx="4" ry="2" fill="white" opacity="0.12"/>

  <!-- Proboscis -->
  <path d="M 64 34 L 64 7" stroke="#2A1A08" stroke-width="3.5" stroke-linecap="round" fill="none"/>

  <!-- Head -->
  <ellipse cx="64" cy="43" rx="12" ry="11" fill="#4A2E10"/>
  <ellipse cx="60" cy="38" rx="4" ry="2.5" fill="white" opacity="0.18"/>

  <!-- Eyes -->
  <circle cx="55" cy="43" r="6" fill="#660000"/>
  <circle cx="73" cy="43" r="6" fill="#660000"/>
  <ellipse cx="53" cy="41" rx="2" ry="1.5" fill="white" opacity="0.60"/>
  <ellipse cx="71" cy="41" rx="2" ry="1.5" fill="white" opacity="0.60"/>
</svg>

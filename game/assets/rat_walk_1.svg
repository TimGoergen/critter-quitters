<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <!-- 4-limbed mammal gait: left-front + right-rear forward; right-front + left-rear back -->
  <!-- Start points are inside the body ellipse so the body covers the root;
       only the tip past the body edge is visible, giving a barely-peeking-out look. -->
  <!-- Left-front leg (forward: angled toward head) -->
  <path d="M 50 54 Q 44 51 38 48" stroke="#706860" stroke-width="8.0" stroke-linecap="round" fill="none"/>
  <!-- Left-back leg (back: angled toward tail) -->
  <path d="M 50 100 Q 44 104 38 108" stroke="#706860" stroke-width="8.0" stroke-linecap="round" fill="none"/>
  <!-- Right-front leg (back: angled toward tail) -->
  <path d="M 78 54 Q 84 57 90 60" stroke="#706860" stroke-width="8.0" stroke-linecap="round" fill="none"/>
  <!-- Right-back leg (forward: angled toward head) -->
  <path d="M 78 100 Q 84 96 90 92" stroke="#706860" stroke-width="8.0" stroke-linecap="round" fill="none"/>

  <!-- Tail: thin curved line from base of body, with slight left-wiggle this frame -->
  <path d="M 64 116 Q 76 122 80 128" stroke="#C09888" stroke-width="2.0" stroke-linecap="round" fill="none"/>

  <!-- Body: large oval, the rat is significantly bigger than the other insects -->
  <ellipse cx="64" cy="78" rx="28" ry="38" fill="#908880"/>

  <!-- Fur texture: a few dark semi-transparent curved ellipses suggesting fur direction -->
  <ellipse cx="64" cy="68" rx="18" ry="5" fill="#706860" opacity="0.35"/>
  <ellipse cx="60" cy="85" rx="16" ry="4" fill="#706860" opacity="0.30"/>
  <ellipse cx="66" cy="100" rx="14" ry="3.5" fill="#706860" opacity="0.25"/>

  <!-- Head: large and round, slightly distinct from body -->
  <circle cx="64" cy="28" r="22" fill="#908880"/>

  <!-- Head specular highlight -->
  <ellipse cx="52" cy="18" rx="9" ry="5.5" fill="white" opacity="0.22"/>

  <!-- Snout: small protruding oval at top -->
  <ellipse cx="64" cy="11" rx="6" ry="5" fill="#E8A090"/>
  <circle cx="64" cy="8" r="2.5" fill="#C06878"/>

  <!-- Ears: flat ovals angled backwards (long axis tilted toward the body), darker inner spot -->
  <ellipse cx="44" cy="26" rx="10" ry="5" fill="#C87080" transform="rotate(-35, 44, 26)"/>
  <ellipse cx="84" cy="26" rx="10" ry="5" fill="#C87080" transform="rotate(35, 84, 26)"/>
  <ellipse cx="44" cy="26" rx="5" ry="2.5" fill="#884050" transform="rotate(-35, 44, 26)"/>
  <ellipse cx="84" cy="26" rx="5" ry="2.5" fill="#884050" transform="rotate(35, 84, 26)"/>

  <!-- Eyes: very small, dark, beady -->
  <circle cx="56" cy="26" r="3" fill="#201818"/>
  <circle cx="72" cy="26" r="3" fill="#201818"/>
  <circle cx="55" cy="25" r="1.2" fill="white" opacity="0.80"/>
  <circle cx="71" cy="25" r="1.2" fill="white" opacity="0.80"/>
</svg>

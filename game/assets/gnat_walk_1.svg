<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <!-- Group A (L-front, R-mid, L-back) forward; Group B (R-front, L-mid, R-back) back -->
  <!-- Legs scaled to ~half length from body attachment points -->
  <path d="M 53 58 Q 46 56 40 53" stroke="#1A1820" stroke-width="2.0" stroke-linecap="round" fill="none"/>
  <path d="M 52 68 Q 44 70 37 72" stroke="#1A1820" stroke-width="2.0" stroke-linecap="round" fill="none"/>
  <path d="M 52 78 Q 44 80 37 83" stroke="#1A1820" stroke-width="2.0" stroke-linecap="round" fill="none"/>
  <path d="M 75 58 Q 83 60 89 63" stroke="#1A1820" stroke-width="2.0" stroke-linecap="round" fill="none"/>
  <path d="M 76 68 Q 84 67 91 66" stroke="#1A1820" stroke-width="2.0" stroke-linecap="round" fill="none"/>
  <path d="M 76 78 Q 84 76 91 74" stroke="#1A1820" stroke-width="2.0" stroke-linecap="round" fill="none"/>

  <!-- Antennae -->
  <path d="M 58 36 Q 50 28 44 22" stroke="#1A1820" stroke-width="2.0" stroke-linecap="round" fill="none"/>
  <path d="M 70 36 Q 78 28 84 22" stroke="#1A1820" stroke-width="2.0" stroke-linecap="round" fill="none"/>
  <circle cx="44" cy="22" r="3" fill="#2A2430"/>
  <circle cx="84" cy="22" r="3" fill="#2A2430"/>

  <!-- Wings swept rearward ~18°, roughly half original size; veins rotate with the wing -->
  <g transform="rotate(18, 40, 65)">
    <ellipse cx="40" cy="65" rx="13" ry="7" fill="#A0B8D0" opacity="0.45"/>
    <line x1="27" y1="65" x2="53" y2="65" stroke="#506070" stroke-width="0.8" opacity="0.60"/>
    <line x1="30" y1="61" x2="50" y2="70" stroke="#506070" stroke-width="0.8" opacity="0.60"/>
  </g>
  <g transform="rotate(-18, 88, 65)">
    <ellipse cx="88" cy="65" rx="13" ry="7" fill="#A0B8D0" opacity="0.45"/>
    <line x1="75" y1="65" x2="101" y2="65" stroke="#506070" stroke-width="0.8" opacity="0.60"/>
    <line x1="78" y1="61" x2="98" y2="70" stroke="#506070" stroke-width="0.8" opacity="0.60"/>
  </g>

  <!-- Body -->
  <ellipse cx="64" cy="72" rx="12" ry="18" fill="#2A2430"/>
  <ellipse cx="64" cy="65" rx="8" ry="2.5" fill="#3A3448" opacity="0.60"/>
  <ellipse cx="64" cy="75" rx="9" ry="2.5" fill="#3A3448" opacity="0.60"/>
  <ellipse cx="64" cy="84" rx="7" ry="2" fill="#3A3448" opacity="0.60"/>
  <ellipse cx="60" cy="60" rx="4" ry="2.5" fill="white" opacity="0.22"/>

  <!-- Head -->
  <circle cx="64" cy="46" r="12" fill="#2A2430"/>
  <ellipse cx="59" cy="40" rx="4.5" ry="3" fill="white" opacity="0.22"/>

  <!-- Eyes -->
  <circle cx="55" cy="46" r="6" fill="#880000"/>
  <circle cx="73" cy="46" r="6" fill="#880000"/>
  <circle cx="53" cy="44" r="2" fill="white" opacity="0.80"/>
  <circle cx="71" cy="44" r="2" fill="white" opacity="0.80"/>
</svg>

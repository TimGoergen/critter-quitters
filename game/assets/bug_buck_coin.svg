<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <!-- Clip all interior detail to the coin circle -->
    <clipPath id="coin-clip">
      <circle cx="64" cy="64" r="57"/>
    </clipPath>
  </defs>

  <!-- Coin base — flat gold, no gradient -->
  <circle cx="64" cy="64" r="62" fill="#7A5200"/>
  <circle cx="64" cy="64" r="60" fill="#E8A800"/>

  <!-- Interior detail clipped to coin -->
  <g clip-path="url(#coin-clip)">

    <!-- Web: 4 radial lines through centre -->
    <line x1="64" y1="4"   x2="64"  y2="124" stroke="#B07800" stroke-width="1.5"/>
    <line x1="4"  y1="64"  x2="124" y2="64"  stroke="#B07800" stroke-width="1.5"/>
    <line x1="19" y1="19"  x2="109" y2="109" stroke="#B07800" stroke-width="1.5"/>
    <line x1="109" y1="19" x2="19"  y2="109" stroke="#B07800" stroke-width="1.5"/>

    <!-- Web: single concentric ring -->
    <circle cx="64" cy="64" r="34" fill="none" stroke="#B07800" stroke-width="1.5"/>

    <!-- Inner rim -->
    <circle cx="64" cy="64" r="53" fill="none" stroke="#B07800" stroke-width="2"/>

    <!-- Spider legs — 8 simple straight lines from thorax area, 4 per side.
         Attachment points cluster near the thorax sides; tips spread wide. -->
    <!-- Left side -->
    <line x1="56" y1="50" x2="34" y2="36" stroke="#7A5200" stroke-width="3"/>
    <line x1="55" y1="58" x2="32" y2="58" stroke="#7A5200" stroke-width="3"/>
    <line x1="55" y1="65" x2="33" y2="72" stroke="#7A5200" stroke-width="3"/>
    <line x1="56" y1="72" x2="36" y2="86" stroke="#7A5200" stroke-width="3"/>
    <!-- Right side -->
    <line x1="72" y1="50" x2="94" y2="36" stroke="#7A5200" stroke-width="3"/>
    <line x1="73" y1="58" x2="96" y2="58" stroke="#7A5200" stroke-width="3"/>
    <line x1="73" y1="65" x2="95" y2="72" stroke="#7A5200" stroke-width="3"/>
    <line x1="72" y1="72" x2="92" y2="86" stroke="#7A5200" stroke-width="3"/>

    <!-- Spider body: thorax (head, upper) then abdomen (lower, larger) -->
    <ellipse cx="64" cy="54" rx="9"  ry="9"  fill="#7A5200"/>
    <ellipse cx="64" cy="72" rx="13" ry="15" fill="#7A5200"/>

    <!-- Highlights — drawn last so they sit on top of all detail -->

    <!-- Rim arc: short curved stroke following the coin's inner curvature at the top.
         Arc at r=48 from 230° to 310° (SVG coords, clockwise sweep) — upper-left to
         upper-right, peaking at 12 o'clock. Rounded linecap keeps the ends soft. -->
    <path d="M 33 27 A 48 48 0 0 1 95 27"
          stroke="white" stroke-width="5" stroke-linecap="round"
          fill="none" opacity="0.40"/>

    <!-- Small ellipse highlights on the spider body -->
    <ellipse cx="60" cy="68" rx="3.5" ry="2" fill="white" opacity="0.38"
             transform="rotate(-25 60 68)"/>
    <ellipse cx="61" cy="50" rx="2.5" ry="1.5" fill="white" opacity="0.32"
             transform="rotate(-20 61 50)"/>

  </g>

  <!-- Outer rim on top so it stays crisp -->
  <circle cx="64" cy="64" r="60" fill="none" stroke="#7A5200" stroke-width="5"/>
</svg>

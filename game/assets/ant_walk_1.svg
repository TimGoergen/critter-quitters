<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <!-- Legs drawn first so body overlaps them at the attachment points -->
  <!-- Group A (L-front, R-mid, L-back) forward; Group B (R-front, L-mid, R-back) back -->
  <path d="M 56 54 Q 40 39 28 28" stroke="#4A2000" stroke-width="3.5" stroke-linecap="round" fill="none"/>
  <path d="M 55 59 Q 38 64 26 67" stroke="#4A2000" stroke-width="3.5" stroke-linecap="round" fill="none"/>
  <path d="M 56 66 Q 40 66 28 66" stroke="#4A2000" stroke-width="3.5" stroke-linecap="round" fill="none"/>
  <path d="M 72 54 Q 87 51 100 48" stroke="#4A2000" stroke-width="3.5" stroke-linecap="round" fill="none"/>
  <path d="M 73 59 Q 89 53 102 47" stroke="#4A2000" stroke-width="3.5" stroke-linecap="round" fill="none"/>
  <path d="M 72 66 Q 87 77 100 86" stroke="#4A2000" stroke-width="3.5" stroke-linecap="round" fill="none"/>

  <!-- Antennae: dark stem, vivid orange tips -->
  <path d="M 57 23 Q 46 12 37 7" stroke="#4A2000" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <path d="M 71 23 Q 82 12 91 7" stroke="#4A2000" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <circle cx="37" cy="7" r="5.5" fill="#FF7722"/>
  <circle cx="91" cy="7" r="5.5" fill="#FF7722"/>

  <!-- Abdomen: vivid amber-orange with darker segmentation bands and a specular highlight -->
  <ellipse cx="64" cy="92" rx="22" ry="25" fill="#D4580A"/>
  <ellipse cx="64" cy="83" rx="19" ry="3.5" fill="#7A2800" opacity="0.50"/>
  <ellipse cx="64" cy="95" rx="20" ry="3.5" fill="#7A2800" opacity="0.50"/>
  <ellipse cx="64" cy="107" rx="15" ry="3" fill="#7A2800" opacity="0.50"/>
  <ellipse cx="59" cy="80" rx="6" ry="3.5" fill="white" opacity="0.22"/>

  <!-- Thorax: slightly darker than abdomen -->
  <ellipse cx="64" cy="59" rx="9" ry="8" fill="#B84008"/>

  <!-- Head: dark reddish-brown with a small specular highlight -->
  <circle cx="64" cy="35" r="15" fill="#7A1E00"/>
  <ellipse cx="59" cy="29" rx="5" ry="3.5" fill="white" opacity="0.18"/>

  <!-- Compound eyes: deep red with white glint -->
  <circle cx="58" cy="33" r="4.5" fill="#CC1100"/>
  <circle cx="70" cy="33" r="4.5" fill="#CC1100"/>
  <circle cx="57" cy="32" r="1.8" fill="white" opacity="0.80"/>
  <circle cx="69" cy="32" r="1.8" fill="white" opacity="0.80"/>
</svg>

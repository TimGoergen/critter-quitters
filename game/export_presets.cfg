; Godot export presets for Critter Quitters Pest Control.
;
; This file is committed to git WITHOUT the Android keystore password.
; CI injects the password at build time from the ANDROID_KEYSTORE_PASS secret (see build.yml).
;
; For local Android builds:
;   1. Place your keystore at build\android_release.keystore (gitignored).
;   2. Set keystore/release_password below to your password.
;   3. Run: git update-index --skip-worktree game/export_presets.cfg
;      This prevents git from tracking your local password change.

[preset.0]

name="Windows Desktop"
platform="Windows Desktop"
runnable=true
dedicated_server=false
custom_features=""
export_filter="all_resources"
include_filter=""
exclude_filter=""
export_path="../dist/critter_quitters_win.exe"
encryption_include_filters=""
encryption_exclude_filters=""
encrypt_pck=false
encrypt_directory=false

[preset.0.options]

; embed_pck=true bundles all game data into the .exe, producing a single self-contained file.
binary_format/embed_pck=true
binary_format/architecture="x86_64"
texture_format/s3tc_bptc=true
texture_format/etc2_astc=false
codesign/enable=false
application/icon="res://assets/icon.svg"
application/product_name="Critter Quitters Pest Control"
application/file_description="Tower defense game by Tim Goergen"

[preset.1]

name="Android"
platform="Android"
runnable=false
dedicated_server=false
custom_features=""
export_filter="all_resources"
include_filter=""
exclude_filter=""
export_path="../dist/critter_quitters.apk"
encryption_include_filters=""
encryption_exclude_filters=""
encrypt_pck=false
encrypt_directory=false

[preset.1.options]

; export_type=0 produces an APK (sideloadable); 1 would produce an AAB (Play Store only)
variant/export_type=0
; use_gradle_build=false uses prebuilt templates and avoids needing the full Android SDK in CI
gradle_build/use_gradle_build=false
; min_sdk and target_sdk cannot be overridden without Gradle build — template defaults apply
architectures/armeabi-v7a=false
architectures/arm64-v8a=true
architectures/x86=false
architectures/x86_64=false
keystore/debug=""
keystore/debug_user=""
keystore/debug_password=""
; Path is relative to the game/ directory, so ../build/ resolves to the repo root's build/ folder
keystore/release="../build/android_release.keystore"
keystore/release_user="critter_quitters"
keystore/release_password=""
package/unique_name="com.timgoergen.critterquitters"
package/name="Critter Quitters Pest Control"
package/signed=true
package/classify_as_game=true
